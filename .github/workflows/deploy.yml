name: Deploy

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      # React Doctor reports a codebase-health score. The CLI is version-pinned,
      # but the score is computed server-side by react.doctor and can move with
      # no code change on our side — it fell from 98 to 84 between two deploys
      # while the tree only got cleaner. We keep it as a visible health signal
      # but do NOT block production deploys on a third-party number we can't
      # control. Target stays 90 for awareness; a low score warns, never fails.
      - name: React Doctor health check (non-blocking)
        continue-on-error: true
        run: |
          TARGET=90
          RAW="$(npx -y react-doctor@0.0.31 . --score)"
          SCORE="$(printf '%s' "$RAW" | grep -Eo '[0-9]+' | tail -1)"
          if [ -z "$SCORE" ]; then
            echo "::warning::Unable to parse React Doctor score from: $RAW"
            exit 0
          fi
          echo "React Doctor score: $SCORE/100 (target $TARGET)"
          echo "### React Doctor: $SCORE/100 (target $TARGET)" >> "$GITHUB_STEP_SUMMARY"
          if [ "$SCORE" -lt "$TARGET" ]; then
            echo "::warning::React Doctor score $SCORE is below the target of $TARGET — health signal only, not blocking deploy"
            npx -y react-doctor@0.0.31 . --verbose || true
          fi
      - run: npm run build
        env:
          NEXT_PUBLIC_FORM_ENDPOINT: ${{ secrets.NEXT_PUBLIC_FORM_ENDPOINT }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'https://www.shelf.nu' }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
          NEXT_PUBLIC_CRISP_WEBSITE_ID: ${{ secrets.NEXT_PUBLIC_CRISP_WEBSITE_ID }}
      - name: Snapshot content changes
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: node scripts/snapshot-content.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      - uses: cloudflare/wrangler-action@v3
        id: deploy
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=shelf-nu
      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const body = `### Preview deployment\n\n${process.env.DEPLOY_URL}`;
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview deployment')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
