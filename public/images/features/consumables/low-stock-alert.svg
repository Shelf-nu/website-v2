<svg width="100%" viewBox="0 0 680 304" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>Low-stock alerts (illustrative)</title>
<desc>Illustrative mockup. An asset row for USB-C cables shows 40 left against a minimum of 50 with a Low stock badge. Below, a low-stock alert card shows it is sent by email to the workspace owner and as an in-app alert to whoever made the change. Representative of the Shelf interface, not a screenshot.</desc>
<defs>
  <filter id="cs4" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#1e293b" flood-opacity="0.10"/></filter>
</defs>
<rect x="0" y="0" width="680" height="304" rx="20" fill="#eef1f5"/>

<!-- asset row showing low stock -->
<rect x="36" y="26" width="608" height="84" rx="14" fill="#ffffff" stroke="#e9eef4" filter="url(#cs4)"/>
<rect x="60" y="48" width="40" height="40" rx="10" fill="#ffedd5"/>
<rect x="71" y="60" width="18" height="15" rx="2.5" fill="none" stroke="#ea580c" stroke-width="1.7"/><line x1="71" y1="66" x2="89" y2="66" stroke="#ea580c" stroke-width="1.7"/>
<text x="114" y="62" font-size="13.5" font-weight="600" fill="#0f172a">USB-C cables</text>
<text x="114" y="80" font-size="11" fill="#94a3b8">Quantity pool · pcs</text>
<text x="452" y="64" text-anchor="end" font-size="19" font-weight="800" fill="#dc2626">40</text>
<text x="456" y="64" font-size="11" fill="#94a3b8">left</text>
<text x="452" y="82" text-anchor="end" font-size="10.5" fill="#94a3b8">minimum 50</text>
<rect x="512" y="55" width="100" height="26" rx="13" fill="#fee2e2"/><circle cx="529" cy="68" r="3" fill="#dc2626"/><text x="540" y="72" font-size="11" font-weight="600" fill="#b91c1c">Low stock</text>

<!-- alert notification card -->
<rect x="36" y="126" width="608" height="148" rx="14" fill="#ffffff" stroke="#e9eef4" filter="url(#cs4)"/>
<path d="M66 162 a7 7 0 0 1 14 0 v5 l3 4 h-20 l3 -4 z" fill="none" stroke="#ea580c" stroke-width="1.7" stroke-linejoin="round"/><circle cx="73" cy="173" r="2" fill="#ea580c"/>
<text x="92" y="163" font-size="14" font-weight="700" fill="#0f172a">Low-stock alert</text>
<rect x="512" y="150" width="100" height="22" rx="11" fill="#fff7ed"/><text x="562" y="165" text-anchor="middle" font-size="10.5" font-weight="600" fill="#9a3412">Email + in-app</text>
<text x="60" y="196" font-size="12" fill="#475569">USB-C cables dropped to 40 — below your minimum of 50.</text>
<circle cx="72" cy="222" r="11" fill="#fff7ed"/><text x="72" y="226" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412">O</text>
<text x="92" y="226" font-size="12" font-weight="500" fill="#0f172a">Email → the workspace owner</text>
<circle cx="72" cy="250" r="11" fill="#eef2ff"/><path d="M68 249 a4 4 0 0 1 8 0 v3 l1.5 2 h-11 l1.5 -2 z" fill="none" stroke="#4338ca" stroke-width="1.2" stroke-linejoin="round"/>
<text x="92" y="254" font-size="12" fill="#475569">In-app → whoever made the change</text>

<text x="620" y="294" text-anchor="end" font-size="10.5" fill="#aab3bf">Illustrative — representative of the Shelf interface, not a screenshot</text>
</svg>
