<svg width="100%" viewBox="0 0 680 250" role="img" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>Low-stock alerts</title>
<desc>When available stock for an item drops to or below its minimum-quantity threshold, Shelf emails the workspace owner and posts an in-app notification to whoever made the change. Alerts fire only when a minimum is set and clear automatically when stock recovers.</desc>
<defs>
  <marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M1 1 L9 5 L1 9" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect x="0" y="0" width="680" height="250" rx="14" fill="#ffffff" stroke="#e8edf3" stroke-width="1"/>
<text x="340" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Low-stock alerts</text>

<!-- LEFT: stock gauge -->
<text x="44" y="74" font-size="13" font-weight="700" fill="#0f172a">USB-C cables</text>
<text x="160" y="74" font-size="11" fill="#dc2626" font-weight="700">Below minimum</text>
<rect x="44" y="92" width="300" height="24" rx="12" fill="#f1f5f9" stroke="#e2e8f0"/>
<rect x="44" y="92" width="120" height="24" rx="12" fill="#dc2626"/>
<line x1="194" y1="84" x2="194" y2="124" stroke="#ea580c" stroke-width="2" stroke-dasharray="4 3"/>
<text x="194" y="138" text-anchor="middle" font-size="10.5" fill="#ea580c" font-weight="600">Min 50</text>
<text x="44" y="138" font-size="10.5" fill="#64748b">Available 40</text>
<text x="344" y="138" text-anchor="end" font-size="10.5" fill="#94a3b8">Total 500</text>
<text x="44" y="172" font-size="11.5" fill="#475569">Available drops to or below the minimum →</text>

<!-- arrows to outputs -->
<line x1="360" y1="120" x2="424" y2="104" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ar2)"/>
<line x1="360" y1="120" x2="424" y2="176" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ar2)"/>

<!-- email card -->
<rect x="430" y="74" width="210" height="72" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
<rect x="446" y="90" width="26" height="18" rx="3" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
<polyline points="447,92 459,101 471,92" fill="none" stroke="#ea580c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
<text x="484" y="98" font-size="11" font-weight="700" fill="#0f172a">Email</text>
<text x="484" y="113" font-size="11" fill="#64748b">to the workspace owner</text>
<text x="446" y="134" font-size="11" fill="#9a3412">“Low stock: USB-C cables (40 left)”</text>

<!-- in-app card -->
<rect x="430" y="156" width="210" height="56" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
<path d="M453 188 a8 8 0 0 1 16 0 v5 l3 4 h-22 l3 -4 z" fill="none" stroke="#0369a1" stroke-width="1.5" stroke-linejoin="round"/>
<circle cx="461" cy="201" r="2.2" fill="#0369a1"/>
<text x="484" y="182" font-size="11" font-weight="700" fill="#0f172a">In-app alert</text>
<text x="484" y="197" font-size="11" fill="#64748b">to whoever made the change</text>

<text x="340" y="236" text-anchor="middle" font-size="12" fill="#94a3b8">Fires only when a minimum is set · clears automatically when stock recovers.</text>
</svg>
