<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>Used up versus returnable consumption (illustrative)</title>
<desc>Illustrative mockup of two item cards. A "Used up" card (gloves, one-way): checking out 50 reduces 200 to 150, consumed and not expected back. A "Returnable" card (cables, two-way): a check-in records 7 returned and 3 lost or used, leaving 97 back in stock. Representative of the Shelf interface, not a screenshot.</desc>
<defs>
  <filter id="cs3" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#1e293b" flood-opacity="0.10"/></filter>
  <marker id="cum" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M1 1 L9 5 L1 9" fill="none" stroke="#cbd5e1" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect x="0" y="0" width="680" height="300" rx="20" fill="#eef1f5"/>

<!-- Card A: used up -->
<rect x="36" y="26" width="300" height="232" rx="16" fill="#ffffff" stroke="#e9eef4" filter="url(#cs3)"/>
<text x="60" y="58" font-size="15" font-weight="700" fill="#0f172a">Gloves</text>
<rect x="232" y="44" width="80" height="22" rx="11" fill="#fff7ed"/><text x="272" y="59" text-anchor="middle" font-size="10.5" font-weight="600" fill="#9a3412">Used up</text>
<text x="60" y="79" font-size="11" fill="#94a3b8">One-way · consumed when handed out</text>
<text x="64" y="142" font-size="22" font-weight="700" fill="#c2cbd6">200</text>
<line x1="112" y1="135" x2="150" y2="135" stroke="#cbd5e1" stroke-width="1.8" marker-end="url(#cum)"/>
<text x="160" y="142" font-size="22" font-weight="800" fill="#0f172a">150</text>
<text x="212" y="142" font-size="12" fill="#64748b">pcs</text>
<rect x="64" y="160" width="150" height="26" rx="8" fill="#f8fafc" stroke="#eef2f7"/><text x="76" y="177" font-size="11" fill="#475569">− 50 checked out</text>
<text x="64" y="212" font-size="11" fill="#64748b">Consumed — not expected back.</text>

<!-- Card B: returnable -->
<rect x="348" y="26" width="296" height="232" rx="16" fill="#ffffff" stroke="#e9eef4" filter="url(#cs3)"/>
<text x="372" y="58" font-size="15" font-weight="700" fill="#0f172a">Cables</text>
<rect x="536" y="44" width="88" height="22" rx="11" fill="#eef2ff"/><text x="580" y="59" text-anchor="middle" font-size="10.5" font-weight="600" fill="#4338ca">Returnable</text>
<text x="372" y="79" font-size="11" fill="#94a3b8">Two-way · returned with a report</text>
<rect x="372" y="100" width="116" height="46" rx="9" fill="#f8fafc" stroke="#eef2f7"/><text x="386" y="119" font-size="9" font-weight="700" letter-spacing="0.5" fill="#94a3b8">RETURNED</text><text x="386" y="139" font-size="16" font-weight="800" fill="#16a34a">7</text>
<rect x="500" y="100" width="120" height="46" rx="9" fill="#f8fafc" stroke="#eef2f7"/><text x="514" y="119" font-size="9" font-weight="700" letter-spacing="0.5" fill="#94a3b8">LOST / USED</text><text x="514" y="139" font-size="16" font-weight="800" fill="#dc2626">3</text>
<text x="372" y="184" font-size="14" font-weight="700" fill="#0f172a">→ 97 pcs back in stock</text>
<text x="372" y="204" font-size="11" fill="#94a3b8">3 deducted as consumed</text>

<text x="620" y="284" text-anchor="end" font-size="10.5" fill="#aab3bf">Illustrative — representative of the Shelf interface, not a screenshot</text>
</svg>
