<svg width="100%" viewBox="0 0 680 384" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>Quantity-aware custody (illustrative)</title>
<desc>Illustrative mockup of a custody panel for a pool of 100 USB-C cables: a segmented availability bar shows Sarah holding 20, Mike holding 15, and 65 available; each custodian is a row with their share and a Release action, and an Assign button hands out more units. Representative of the Shelf interface, not a screenshot.</desc>
